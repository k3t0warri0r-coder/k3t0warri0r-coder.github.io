<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="refresh" content="5">
<meta charset="UTF-8">
<title>Custom Bingo Card</title>
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #eee;
    height: 100vh;
  }

  .bingo-wrapper {
    position: relative;
    width: 756px;   /* adjust to match your image ratio */
    height: 900px;  /* adjust to match your image ratio */
    background-image: url("./blank%20bingo%20card.jpg");
    background-size: cover;
    background-position: center;
  }

  .bingo-grid {
    position: absolute;
    left: 50%;
    top: 57%;
    transform: translate(-50%, -50%);
    width: 92%;     /* adjust to align grid with image */
    height: 79%;    /* adjust to align grid with image */
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(5, 1fr);
  }

  .bingo-cell {
    padding: 11px;
    box-sizing: border-box;
    overflow-wrap: break-word;
    word-wrap: break-word;
    word-break: break-word;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
    font-size: 20px;
  }

  .bingo-cell {
    position: relative;
  }

  .stamp {
    position: absolute;
    inset: 0;
    background-image: url("./squirrel-stamp.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.45; /* adjust transparency */
    pointer-events: none;
  }

</style>
</head>
<body>
